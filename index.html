<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ermine Studio - Hyperliquid Community Initiative</title>
  <meta name="description" content="Community-driven marketing and events initiative for Hyperliquid">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes hop {
      0%, 100% { transform: translateY(0); }
      25% { transform: translateY(-20px) rotate(-3deg); }
      50% { transform: translateY(-30px) rotate(0deg); }
      75% { transform: translateY(-15px) rotate(3deg); }
    }
    .animate-hop {
      animation: hop 0.6s ease-in-out;
    }
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body class="bg-neutral-900">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    function ErmineStudioWebsite() {
      const [currentPage, setCurrentPage] = useState('home');
      const [isHopping, setIsHopping] = useState(false);

      const triggerHop = () => {
        setIsHopping(true);
        setTimeout(() => setIsHopping(false), 600);
      };

      const Navigation = () => (
        <nav className="fixed top-0 left-0 right-0 z-50 bg-black bg-opacity-90 backdrop-blur-sm border-b border-white border-opacity-10">
          <div className="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <button 
              onClick={() => setCurrentPage('home')}
              className="text-white text-lg font-light tracking-wider hover:opacity-70 transition-opacity"
            >
              ERMINE STUDIO
            </button>
            <div className="flex gap-8">
              <button
                onClick={() => setCurrentPage('home')}
                className={`text-sm tracking-wider transition-all ${
                  currentPage === 'home' 
                    ? 'text-white border-b border-white' 
                    : 'text-white text-opacity-60 hover:text-opacity-100'
                }`}
              >
                HOME
              </button>
              <button
                onClick={() => setCurrentPage('about')}
                className={`text-sm tracking-wider transition-all ${
                  currentPage === 'about' 
                    ? 'text-white border-b border-white' 
                    : 'text-white text-opacity-60 hover:text-opacity-100'
                }`}
              >
                ABOUT
              </button>
              <button
                onClick={() => setCurrentPage('contact')}
                className={`text-sm tracking-wider transition-all ${
                  currentPage === 'contact' 
                    ? 'text-white border-b border-white' 
                    : 'text-white text-opacity-60 hover:text-opacity-100'
                }`}
              >
                CONTACT
              </button>
            </div>
          </div>
        </nav>
      );

      const ErmineIllustration = ({ size = 120, interactive = false }) => (
        <div
          className={`inline-block ${interactive ? 'cursor-pointer' : ''} ${
            isHopping ? 'animate-hop' : ''
          }`}
          onMouseEnter={interactive ? triggerHop : undefined}
          onClick={interactive ? triggerHop : undefined}
        >
          <svg viewBox="0 0 180 220" style={{ width: `${size}px`, height: 'auto' }}>
            <g transform="translate(0, 0)">
              <path d="M 70 50 Q 65 45 65 35 Q 65 25 70 20 Q 80 15 90 15 Q 100 15 110 20 Q 115 25 115 35 Q 115 45 110 50" 
                fill="white" stroke="black" strokeWidth="2"/>
              <path d="M 70 20 L 68 10 Q 67 5 70 3 Q 72 5 72 10 L 73 18" 
                fill="white" stroke="black" strokeWidth="2"/>
              <path d="M 110 20 L 112 10 Q 113 5 110 3 Q 108 5 108 10 L 107 18" 
                fill="white" stroke="black" strokeWidth="2"/>
              <path d="M 69 15 Q 68 12 69 10" fill="none" stroke="black" strokeWidth="1"/>
              <path d="M 71 16 Q 70 13 71 11" fill="none" stroke="black" strokeWidth="1"/>
              <path d="M 111 15 Q 112 12 111 10" fill="none" stroke="black" strokeWidth="1"/>
              <path d="M 109 16 Q 110 13 109 11" fill="none" stroke="black" strokeWidth="1"/>
              <path d="M 65 40 L 35 35" fill="none" stroke="black" strokeWidth="1.5"/>
              <path d="M 65 43 L 30 43" fill="none" stroke="black" strokeWidth="1.5"/>
              <path d="M 66 46 L 32 50" fill="none" stroke="black" strokeWidth="1.5"/>
              <path d="M 67 49 L 35 55" fill="none" stroke="black" strokeWidth="1.5"/>
              <path d="M 115 40 L 145 35" fill="none" stroke="black" strokeWidth="1.5"/>
              <path d="M 115 43 L 150 43" fill="none" stroke="black" strokeWidth="1.5"/>
              <path d="M 114 46 L 148 50" fill="none" stroke="black" strokeWidth="1.5"/>
              <path d="M 113 49 L 145 55" fill="none" stroke="black" strokeWidth="1.5"/>
              <circle cx="78" cy="35" r="4" fill="black"/>
              <circle cx="102" cy="35" r="4" fill="black"/>
              <circle cx="79" cy="34" r="1.5" fill="white"/>
              <circle cx="103" cy="34" r="1.5" fill="white"/>
              <path d="M 90 45 Q 88 47 86 48 Q 85 49 85 50 Q 85 52 87 53 Q 90 54 93 53 Q 95 52 95 50 Q 95 49 94 48 Q 92 47 90 45" 
                fill="black"/>
              <path d="M 90 53 Q 85 56 82 57" fill="none" stroke="black" strokeWidth="1"/>
              <path d="M 90 53 Q 95 56 98 57" fill="none" stroke="black" strokeWidth="1"/>
              <path d="M 70 50 Q 60 60 55 75 Q 52 90 50 110 Q 48 130 48 150 Q 48 170 52 185 Q 60 195 70 200 Q 80 203 90 203 Q 100 203 110 200 Q 120 195 128 185 Q 132 170 132 150 Q 132 130 130 110 Q 128 90 125 75 Q 120 60 110 50" 
                fill="white" stroke="black" strokeWidth="2"/>
              <path d="M 60 140 Q 58 160 56 180 L 54 200 Q 52 203 50 203 L 48 200 Q 48 198 50 198 L 58 198 Q 60 200 58 203" 
                fill="white" stroke="black" strokeWidth="2"/>
              <path d="M 120 140 Q 122 160 124 180 L 126 200 Q 128 203 130 203 L 132 200 Q 132 198 130 198 L 122 198 Q 120 200 122 203" 
                fill="white" stroke="black" strokeWidth="2"/>
              <path d="M 65 175 Q 62 188 60 200 L 58 210 L 56 213 Q 54 214 53 212 L 54 208 L 62 208 Q 63 210 62 212" 
                fill="white" stroke="black" strokeWidth="2"/>
              <path d="M 115 175 Q 118 188 120 200 L 122 210 L 124 213 Q 126 214 127 212 L 126 208 L 118 208 Q 117 210 118 212" 
                fill="white" stroke="black" strokeWidth="2"/>
              <path d="M 52 185 Q 40 180 30 170 Q 22 160 18 145" 
                fill="none" stroke="black" strokeWidth="3" strokeLinecap="round"/>
              <path d="M 55 182 Q 45 178 36 170 Q 28 160 25 148" 
                fill="none" stroke="black" strokeWidth="1.5"/>
              <path d="M 70 120 Q 68 135 68 150" fill="none" stroke="black" strokeWidth="1" strokeOpacity="0.3"/>
              <path d="M 90 115 Q 90 130 90 150" fill="none" stroke="black" strokeWidth="1" strokeOpacity="0.3"/>
              <path d="M 110 120 Q 112 135 112 150" fill="none" stroke="black" strokeWidth="1" strokeOpacity="0.3"/>
            </g>
          </svg>
        </div>
      );

      const HomePage = () => (
        <div>
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <ErmineIllustration size={140} interactive={true} />
              <h1 className="mt-8 text-6xl font-extralight tracking-[0.3em] text-white">
                ERMINE
              </h1>
              <p className="mt-2 text-xl font-light tracking-[0.2em] text-white text-opacity-70">
                STUDIO
              </p>
            </div>
          </div>

          <div className="w-full min-h-screen flex items-center justify-center bg-gradient-to-b from-neutral-900 to-black py-20">
            <div className="max-w-7xl w-full px-6">
              <div className="relative group">
                <img 
                  src="./portal-scene.jpg"
                  alt="Ermine looking into mystical portal"
                  className="w-full h-auto rounded-lg shadow-2xl"
                />
                <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-40 rounded-lg pointer-events-none"></div>
              </div>
              <div className="text-center mt-12 space-y-2">
                <p className="text-white text-opacity-60 text-sm tracking-widest uppercase">
                  Community • Marketing • Events
                </p>
              </div>
            </div>
          </div>
        </div>
      );

      const AboutPage = () => (
        <div className="min-h-screen flex items-center justify-center px-6">
          <div className="max-w-2xl">
            <h1 className="text-5xl font-extralight tracking-[0.2em] text-white mb-12 text-center">
              ABOUT
            </h1>
            <div className="space-y-6 text-white text-opacity-80 leading-relaxed">
              <p className="text-lg font-light">
                Ermine Studio is a community-driven initiative dedicated to marketing and promoting Hyperliquid to the world. We bring together passionate community members, creators, and advocates to amplify Hyperliquid's presence through coordinated campaigns, educational content, and engaging events.
              </p>
              <p className="text-lg font-light">
                Our mission is to build awareness, foster adoption, and create meaningful connections within the Hyperliquid ecosystem. Through grassroots marketing efforts and community-organized events, we're helping to shape the future of decentralized trading.
              </p>
              <p className="text-lg font-light">
                Whether you're a trader, developer, content creator, or simply curious about Hyperliquid, Ermine Studio welcomes you to join our growing community and contribute to this exciting movement.
              </p>
            </div>
          </div>
        </div>
      );

      const ContactPage = () => (
        <div className="min-h-screen flex items-center justify-center px-6">
          <div className="max-w-xl w-full">
            <h1 className="text-5xl font-extralight tracking-[0.2em] text-white mb-12 text-center">
              CONTACT
            </h1>
            <div className="space-y-8">
              <div className="text-center">
                <p className="text-white text-opacity-60 text-sm tracking-wider mb-3">EMAIL</p>
                <a 
                  href="mailto:tyson.patrick@protonmail.com"
                  className="text-white text-lg hover:text-opacity-70 transition-opacity tracking-wide"
                >
                  tyson.patrick@protonmail.com
                </a>
              </div>
              <div className="text-center">
                <p className="text-white text-opacity-60 text-sm tracking-wider mb-3">TWITTER / X</p>
                <a 
                  href="https://twitter.com/PashiPas"
                  target="_blank"
                  rel="noopener noreferrer"
                  className="text-white text-lg hover:text-opacity-70 transition-opacity tracking-wide"
                >
                  @PashiPas
                </a>
              </div>
              <div className="mt-12 pt-8 border-t border-white border-opacity-10 text-center">
                <p className="text-white text-opacity-50 text-sm font-light">
                  Get in touch to learn more about Ermine Studio or to collaborate on Hyperliquid community initiatives.
                </p>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="bg-neutral-900 min-h-screen">
          <Navigation />
          
          <div className="pt-20">
            {currentPage === 'home' && <HomePage />}
            {currentPage === 'about' && <AboutPage />}
            {currentPage === 'contact' && <ContactPage />}
          </div>
          
          <footer className="fixed bottom-0 left-0 right-0 py-4 text-center border-t border-white border-opacity-10 bg-black bg-opacity-50 backdrop-blur-sm">
            <p className="text-white text-opacity-40 text-xs tracking-wider">
              © 2026 ERMINE STUDIO
            </p>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<ErmineStudioWebsite />, document.getElementById('root'));
  </script>
</body>
</html>

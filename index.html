<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ermine Studio - Spreading The Vision Of Hyperliquid To The World</title>
  <meta name="description" content="Premium Web3 marketing and creative agency for Hyperliquid">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Barlow', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
    }
    .hero-section {
      position: relative;
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    .nav-bar {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 48px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      z-index: 1000;
      max-width: 90vw;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    .logo svg {
      width: 32px;
      height: auto;
    }
    .logo-text {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 0.5px;
    }
    .nav-link {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .nav-link:hover {
      opacity: 0.6;
    }
    .contact-btn {
      background: #222;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
      text-decoration: none;
    }
    .contact-btn:hover {
      background: #000;
    }
    .arrow-icon {
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-content {
      text-align: center;
      z-index: 10;
      padding: 0 24px;
      max-width: 1200px;
      position: relative;
    }
    .hero-headline {
      font-size: clamp(32px, 5vw, 72px);
      font-weight: 300;
      color: white;
      line-height: 1.2;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 40px rgba(0, 0, 0, 0.4);
    }
    @media (max-width: 768px) {
      .nav-bar {
        flex-direction: column;
        gap: 16px;
        padding: 20px 24px;
      }
    }
  </style>
</head>
<body>
  <section class="hero-section">
    <video class="video-background" autoplay muted loop playsinline>
      <source src="./Landing_Vid_Ermine.mp4" type="video/mp4">
    </video>
    <nav class="nav-bar">
      <a href="#" class="logo">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <path fill="#f8f8f8" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M 100 180 Q 75 175 60 160 Q 50 145 48 125 Q 47 105 50 90 Q 53 75 60 65 Q 70 50 85 45 Q 95 42 105 42 Q 115 42 125 45 Q 140 50 150 65 Q 157 75 160 90 Q 163 105 162 125 Q 160 145 150 160 Q 135 175 120 180 Z"/>
          <ellipse fill="#f8f8f8" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" cx="100" cy="50" rx="28" ry="30"/>
          <path fill="#f8f8f8" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M 78 35 Q 75 28 76 22 Q 77 18 80 17 Q 83 18 84 22 Q 85 28 83 34"/>
          <path fill="#f8f8f8" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M 122 35 Q 125 28 124 22 Q 123 18 120 17 Q 117 18 116 22 Q 115 28 117 34"/>
          <ellipse fill="#1a1a1a" cx="88" cy="48" rx="3" ry="4"/>
          <ellipse fill="#1a1a1a" cx="112" cy="48" rx="3" ry="4"/>
          <path fill="#1a1a1a" d="M 100 58 L 97 62 L 103 62 Z"/>
          <line fill="none" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round" x1="72" y1="52" x2="50" y2="50"/>
          <line fill="none" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round" x1="72" y1="55" x2="48" y2="55"/>
          <line fill="none" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round" x1="128" y1="52" x2="150" y2="50"/>
          <line fill="none" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round" x1="128" y1="55" x2="152" y2="55"/>
          <ellipse fill="#f8f8f8" stroke="#1a1a1a" stroke-width="2" cx="75" cy="175" rx="10" ry="8"/>
          <ellipse fill="#f8f8f8" stroke="#1a1a1a" stroke-width="2" cx="105" cy="175" rx="10" ry="8"/>
        </svg>
        <span class="logo-text">ERMINE STUDIO</span>
      </a>
      <a href="#" class="nav-link">About</a>
      <a href="#" class="contact-btn">
        Contact
        <span class="arrow-icon">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 9L9 1M9 1H1M9 1V9" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </a>
    </nav>
    <div class="hero-content">
      <h1 class="hero-headline">Spreading The Vision Of Hyperliquid To The World</h1>
    </div>
  </section>
</body>
</html>
